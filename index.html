<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>planfact-dashboard-mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <style>
    :root{
      --bg:#f3f4f6;
      --surface:#fbfbfc;
      --surface2:#f7f7f8;
      --border:rgba(27,31,36,.12);
      --text:#17191c;
      --muted:#66707a;
      --primary:#1f6feb;
      --success:#2f7d32;
      --warn:#b76e00;
      --error:#b42318;
      --shadow:0 1px 2px rgba(17,24,39,.05),0 8px 24px rgba(17,24,39,.04);
      --radius:.9rem;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:15px/1.45 Inter,system-ui,sans-serif;
    }
    .shell{
      max-width:412px;
      margin:0 auto;
      padding:8px;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
    }
    .total{
      background:var(--surface2);
      border-radius:12px;
      padding:10px 12px;
      margin-bottom:8px;
      text-align:center;
    }
    .total .label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
    }
    .total .num{
      font-size:34px;
      line-height:1;
      font-weight:800;
      margin-top:4px;
    }
    .total .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }
    .corps{
      display:grid;
      gap:6px;
      margin-bottom:8px;
    }
    .corp-card{
      background:var(--surface2);
      border-radius:10px;
      padding:8px 9px;
    }
    .corp-title{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      margin-bottom:4px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
    }
    .row + .row{
      margin-top:3px;
    }
    .k{
      color:var(--muted);
    }
    .ok{color:var(--success)}
    .warnc{color:var(--warn)}
    .bad{color:var(--error)}
    .chart-title{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
      margin:2px 0 4px;
    }
    .chart-wrap{
      height:132px;
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="card" id="rootCard">
    <div class="total">
      <div class="label">Общий процент выполнения плана</div>
      <div class="num" id="kpiPct">—</div>
      <div class="sub" id="kpiSub">Загрузка…</div>
    </div>

    <div class="corps" id="corps"></div>

    <div class="chart-title">Динамика по корпусам</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjo8Kl0hQ0mNl72rKCvl1PkhwvGBpMF5zPz9H38wlPB_SU2xB7C9oLUWsUlidrc2bBUASvwP0L4XCK/pub?gid=468373869&single=true&output=csv';

const els = {
  rootCard: document.getElementById('rootCard'),
  kpiPct: document.getElementById('kpiPct'),
  kpiSub: document.getElementById('kpiSub'),
  corps: document.getElementById('corps')
};

let chart;

function parseCSV(text){
  const rows=[];
  let row=[], field='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='\"'){
      if(q && n==='\"'){ field+='\"'; i++; }
      else q=!q;
    } else if(c===',' && !q){
      row.push(field); field='';
    } else if((c==='\\n'||c==='\\r') && !q){
      if(c==='\\r'&&n==='\\n') i++;
      row.push(field);
      rows.push(row);
      row=[];
      field='';
    } else {
      field+=c;
    }
  }
  if(field.length || row.length){
    row.push(field);
    rows.push(row);
  }
  return rows.filter(r=>r.some(v=>String(v).trim()!==''));
}

const nk = s => String(s||'').trim().toLowerCase().replace(/ё/g,'е');

const num = v => {
  const s = String(v??'').replace(/\s+/g,'').replace(',', '.');
  const m = s.match(/-?\d+(?:\.\d+)?/);
  return m ? Number(m[0]) : 0;
};

const fmt = n => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0})
  .format(Math.round(n||0));

const pct = v => Number.isFinite(v) ? `${v.toFixed(1)}%` : '—';

const cls = p => p>=100 ? 'ok' : p>=90 ? 'warnc' : 'bad';

function mapRows(raw){
  const h = raw[0].map(nk);
  const idx = vars => h.findIndex(x=>vars.some(v=>x.includes(v)));
  const m = {
    date:idx(['дата']),
    corpus:idx(['корпус']),
    plan:idx(['план']),
    fact:idx(['факт']),
    downtime:idx(['простой']),
    scrap:idx(['брак'])
  };
  return raw.slice(1).map(r=>({
    date:r[m.date]||'',
    corpus:r[m.corpus]||'—',
    plan:num(r[m.plan]),
    fact:num(r[m.fact]),
    downtime:num(r[m.downtime]),
    scrap:num(r[m.scrap])
  })).filter(r=>r.date);
}

function group(rows){
  const g=new Map();
  rows.forEach(r=>{
    if(!g.has(r.date)) g.set(r.date,[]);
    g.get(r.date).push(r);
  });
  return [...g.entries()]
    .sort((a,b)=>String(a[0]).localeCompare(String(b[0])));
}

function sum(rows){
  const s={plan:0,fact:0,downtime:0,scrap:0,corps:{}};
  rows.forEach(r=>{
    s.plan+=r.plan;
    s.fact+=r.fact;
    s.downtime+=r.downtime;
    s.scrap+=r.scrap;
    const k=`Корпус ${r.corpus}`;
    s.corps[k]=s.corps[k]||{plan:0,fact:0,downtime:0,scrap:0};
    s.corps[k].plan+=r.plan;
    s.corps[k].fact+=r.fact;
    s.corps[k].downtime+=r.downtime;
    s.corps[k].scrap+=r.scrap;
  });
  s.pct = s.plan ? s.fact/s.plan*100 : 0;
  s.delta = s.fact - s.plan;
  return s;
}

function renderCorps(corps){
  els.corps.innerHTML = Object.entries(corps).map(([name,v])=>{
    const p = v.plan ? v.fact/v.plan*100 : 0;
    return `<div class="corp-card">
      <div class="corp-title">${name}</div>
      <div class="row"><span class="k">План</span><span>${fmt(v.plan)}</span></div>
      <div class="row"><span class="k">Факт</span><span>${fmt(v.fact)}</span></div>
      <div class="row"><span class="k">Выполнение</span><span class="${cls(p)}">${pct(p)}</span></div>
      <div class="row"><span class="k">Простой</span><span>${fmt(v.downtime)} мин</span></div>
      <div class="row"><span class="k">Брак</span><span>${fmt(v.scrap)}</span></div>
    </div>`;
  }).join('');
}

function renderChart(groups){
  const labels=[], corp1=[], corp2=[];
  groups.slice(-7).forEach(([d,rows])=>{
    labels.push(d);
    const byCorp={};
    rows.forEach(r=>{
      const k=r.corpus;
      byCorp[k]=byCorp[k]||{plan:0,fact:0};
      byCorp[k].plan+=r.plan;
      byCorp[k].fact+=r.fact;
    });
    const c1=byCorp['1']||byCorp['Корпус 1']||{plan:0,fact:0};
    const c2=byCorp['2']||byCorp['Корпус 2']||{plan:0,fact:0};
    corp1.push(c1.plan ? c1.fact/c1.plan*100 : 0);
    corp2.push(c2.plan ? c2.fact/c2.plan*100 : 0);
  });
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:'Корпус 1',
          data:corp1,
          borderColor:'rgba(31,111,235,.95)',
          backgroundColor:'rgba(31,111,235,.12)',
          tension:.25,
          fill:false
        },
        {
          label:'Корпус 2',
          data:corp2,
          borderColor:'rgba(47,180,84,.95)',
          backgroundColor:'rgba(47,180,84,.12)',
          tension:.25,
          fill:false
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{
          display:true,
          position:'bottom',
          labels:{boxWidth:10,font:{size:11}}
        }
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{maxRotation:0,font:{size:10}}
        },
        y:{
          beginAtZero:true,
          suggestedMax:110,
          ticks:{
            callback:v=>v+'%',
            font:{size:10}
          },
          grid:{color:'rgba(148,163,184,.35)'}
        }
      }
    }
  });
}

async function load(){
  try{
    const res = await fetch(CSV_URL + '&ts=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const rows = mapRows(parseCSV(await res.text()));
    if(!rows.length) throw new Error('CSV пуст или не распознан');
    const groups = group(rows);
    const latest = groups[groups.length-1]?.[1] || [];
    const s = sum(latest);

    els.kpiPct.textContent = pct(s.pct);
    els.kpiPct.className = 'num ' + cls(s.pct);
    els.kpiSub.textContent = `${fmt(s.fact)} из ${fmt(s.plan)} коробок`;

    renderCorps(s.corps);
    renderChart(groups);
  }catch(e){
    els.rootCard.innerHTML =
      `<div style="font-size:13px;color:#b42318">
        Ошибка загрузки: ${e.message}
      </div>`;
  }
}

load();
setInterval(load,300000);
</script>
</body>
</html>
