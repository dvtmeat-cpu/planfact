<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>План / факт — дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <style>
    :root{
      --bg:#f3f4f6;
      --surface:#fbfbfc;
      --surface2:#f7f7f8;
      --border:rgba(27,31,36,.12);
      --text:#17191c;
      --muted:#66707a;
      --success:#2f7d32;
      --warn:#b76e00;
      --error:#b42318;
      --shadow:0 1px 2px rgba(17,24,39,.05),0 8px 24px rgba(17,24,39,.04);
      --radius:.9rem;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:15px/1.45 Inter,system-ui,sans-serif;
    }
    .shell{
      max-width:412px;
      margin:0 auto;
      padding:8px;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
    }
    .total{
      background:var(--surface2);
      border-radius:12px;
      padding:10px 12px;
      margin-bottom:8px;
      text-align:center;
    }
    .total .label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
    }
    .total .num{
      font-size:34px;
      line-height:1;
      font-weight:800;
      margin-top:4px;
    }
    .total .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .month{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
      margin-bottom:4px;
      text-align:center;
    }

    .corps{
      display:grid;
      gap:6px;
      margin-bottom:8px;
    }
    .corp-card{
      background:var(--surface2);
      border-radius:10px;
      padding:7px 9px;
    }
    .corp-title{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      margin-bottom:4px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      font-size:12px;
    }
    .row + .row{
      margin-top:3px;
    }
    .k{
      color:var(--muted);
    }

    /* новая цветовая логика выполнения */
    .perf{
      font-size:22px;
      font-weight:700;
    }
    .perf-low{color:#b42318;}     /* <80% */
    .perf-mid{color:#e0aa00;}     /* 80–95% */
    .perf-high{color:#2f7d32;}    /* >95% */

    .chart-title{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:var(--muted);
      margin:6px 0 4px;
    }
    .chart-wrap{
      height:130px;
      margin-bottom:4px;
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="card" id="rootCard">
    <div class="total">
      <div class="label">Общий процент выполнения плана (все дни)</div>
      <div class="num perf" id="kpiPct">—</div>
      <div class="sub" id="kpiSub">Загрузка…</div>
    </div>

    <div class="month" id="monthLabel">Месяц не определён</div>

    <div class="corps" id="corps"></div>

    <div class="chart-title">Объём выпуска по корпусам</div>
    <div class="chart-wrap"><canvas id="chartOutput"></canvas></div>

    <div class="chart-title">Объём брака по корпусам</div>
    <div class="chart-wrap"><canvas id="chartScrap"></canvas></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjo8Kl0hQ0mNl72rKCvl1PkhwvGBpMF5zPz9H38wlPB_SU2xB7C9oLUWsUlidrc2bBUASvwP0L4XCK/pub?gid=468373869&single=true&output=csv';

const els = {
  rootCard: document.getElementById('rootCard'),
  kpiPct: document.getElementById('kpiPct'),
  kpiSub: document.getElementById('kpiSub'),
  monthLabel: document.getElementById('monthLabel'),
  corps: document.getElementById('corps')
};

let chartOutput, chartScrap;

// --- утилиты ---
function parseCSV(text){
  const rows = [];
  let row = [], field = '', q = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(c === '"'){
      if(q && n === '"'){ field += '"'; i++; }
      else q = !q;
    } else if(c === ',' && !q){
      row.push(field); field = '';
    } else if((c === '\n' || c === '\r') && !q){
      if(c === '\r' && n === '\n') i++;
      row.push(field);
      rows.push(row);
      row = [];
      field = '';
    } else {
      field += c;
    }
  }
  if(field.length || row.length){
    row.push(field);
    rows.push(row);
  }
  return rows.filter(r => r.some(v => String(v).trim() !== ''));
}

const nk = s => String(s || '').trim().toLowerCase().replace(/ё/g,'е');
const num = v => {
  const s = String(v ?? '').replace(/\s+/g,'').replace(',', '.');
  const m = s.match(/-?\d+(?:\.\d+)?/);
  return m ? Number(m[0]) : 0;
};
const fmt = n => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n || 0));
const pct = v => Number.isFinite(v) ? `${v.toFixed(1)}%` : '—';

// новые пороги
function perfClass(p){
  if(p < 80) return 'perf perf-low';
  if(p < 95) return 'perf perf-mid';
  return 'perf perf-high';
}

// --- читаем строки ---
function mapRows(raw){
  if(!raw.length) return [];
  const h = raw[0].map(nk);
  const idx = vars => h.findIndex(x => vars.some(v => x.includes(v)));

  const m = {
    date: idx(['дата']),
    corpus: idx(['корпус']),
    plan: idx(['план_коробки','план коробки','план']),
    fact: idx(['факт_коробки','факт коробки','факт']),
    scrap: idx(['брак_коробки','брак коробки','брак'])
  };

  return raw.slice(1).map(r => ({
    date: r[m.date] || '',
    corpus: r[m.corpus] || '—',
    plan: num(r[m.plan]),
    fact: num(r[m.fact]),
    scrap: num(r[m.scrap])
  })).filter(r => r.corpus && r.plan && r.fact);
}

// --- агрегируем по всем датам ---
function summarizeAll(rows){
  const total = { plan:0, fact:0, scrap:0, corps:{} };

  rows.forEach(r => {
    total.plan  += r.plan;
    total.fact  += r.fact;
    total.scrap += r.scrap;

    const key = `Корпус ${r.corpus}`;
    if(!total.corps[key]){
      total.corps[key] = { plan:0, fact:0, scrap:0 };
    }
    total.corps[key].plan  += r.plan;
    total.corps[key].fact  += r.fact;
    total.corps[key].scrap += r.scrap;
  });

  total.perfPct  = total.plan ? total.fact / total.plan * 100 : 0;
  total.scrapPct = total.fact ? total.scrap / total.fact * 100 : 0;

  return total;
}

// --- вывод месяца ---
function renderMonth(rows){
  if(!rows.length){
    els.monthLabel.textContent = 'Месяц не определён';
    return;
  }
  const dates = rows.map(r => r.date).filter(Boolean).sort();
  const first = dates[0];
  // ожидаемый формат: YYYY-MM-DD
  const [y,m] = first.split('-');
  const months = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
  const idx = Number(m) - 1;
  if(idx >= 0 && idx < 12){
    els.monthLabel.textContent = `${months[idx]} ${y}`;
  } else {
    els.monthLabel.textContent = first;
  }
}

// --- вывод корпусов ---
function renderCorps(corps){
  const entries = Object.entries(corps).sort((a,b) => {
    const na = parseInt(a[0].replace(/\D+/g,''),10) || 0;
    const nb = parseInt(b[0].replace(/\D+/g,''),10) || 0;
    return na - nb;
  });

  els.corps.innerHTML = entries.map(([name,v]) => {
    const perf = v.plan ? v.fact / v.plan * 100 : 0;
    const scrapPct = v.fact ? v.scrap / v.fact * 100 : 0;

    return `<div class="corp-card">
      <div class="corp-title">${name}</div>
      <div class="row"><span class="k">План</span><span>${fmt(v.plan)}</span></div>
      <div class="row"><span class="k">Факт</span><span>${fmt(v.fact)}</span></div>
      <div class="row"><span class="k">Выполнение</span><span class="${perfClass(perf)}">${pct(perf)}</span></div>
      <div class="row"><span class="k">Брак</span><span>${fmt(v.scrap)} (${pct(scrapPct)})</span></div>
    </div>`;
  }).join('');
}

// --- графики ---
function renderCharts(corps){
  const labels = [];
  const facts = [];
  const scraps = [];

  const entries = Object.entries(corps).sort((a,b) => {
    const na = parseInt(a[0].replace(/\D+/g,''),10) || 0;
    const nb = parseInt(b[0].replace(/\D+/g,''),10) || 0;
    return na - nb;
  });

  entries.forEach(([name,v]) => {
    labels.push(name);
    facts.push(v.fact);
    scraps.push(v.scrap);
  });

  if(chartOutput) chartOutput.destroy();
  if(chartScrap) chartScrap.destroy();

  chartOutput = new Chart(document.getElementById('chartOutput'), {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Факт, коробки',
        data:facts,
        backgroundColor:'rgba(37, 99, 235, .85)',
        borderRadius:8,
        borderSkipped:false
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false}
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{font:{size:10}}
        },
        y:{
          beginAtZero:true,
          ticks:{font:{size:10}},
          grid:{color:'rgba(148,163,184,.35)'}
        }
      }
    }
  });

  chartScrap = new Chart(document.getElementById('chartScrap'), {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Брак, коробки',
        data:scraps,
        backgroundColor:'rgba(220, 38, 38, .85)',
        borderRadius:8,
        borderSkipped:false
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false}
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{font:{size:10}}
        },
        y:{
          beginAtZero:true,
          ticks:{font:{size:10}},
          grid:{color:'rgba(148,163,184,.35)'}
        }
      }
    }
  });
}

// --- основная загрузка ---
async function load(){
  try{
    els.kpiSub.textContent = 'Загрузка…';

    const res = await fetch(CSV_URL + '&ts=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);

    const rawRows = parseCSV(await res.text());
    const rows = mapRows(rawRows);
    if(!rows.length) throw new Error('CSV пуст или не распознан');

    const total = summarizeAll(rows);

    els.kpiPct.textContent = pct(total.perfPct);
    els.kpiPct.className = perfClass(total.perfPct);

    const scrapText = total.fact
      ? `, брак ${fmt(total.scrap)} (${pct(total.scrapPct)})`
      : '';
    els.kpiSub.textContent =
      `${fmt(total.fact)} из ${fmt(total.plan)} коробок${scrapText}`;

    renderMonth(rows);
    renderCorps(total.corps);
    renderCharts(total.corps);
  }catch(e){
    els.rootCard.innerHTML =
      `<div style="font-size:13px;color:#b42318">Ошибка загрузки: ${e.message}</div>`;
  }
}

load();
setInterval(load, 300000);
</script>
</body>
</html>
